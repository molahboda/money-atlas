name = "money-atlas-pay"
main = "worker.js"
compatibility_date = "2026-07-01"

# KV 네임스페이스 — 아래 id는 생성 후 채워집니다:
#   npx wrangler kv namespace create LICENSES
[[kv_namespaces]]
binding = "LICENSES"
id = "REPLACE_AFTER_CREATE"

[vars]
PRICE = "39000"
ALLOW_ORIGIN = "https://molahboda.github.io"

# 시크릿 키는 파일에 쓰지 말고 반드시 아래 명령으로 등록:
#   npx wrangler secret put TOSS_SECRET_KEY
