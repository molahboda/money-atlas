name = "money-atlas-updater"
main = "updater.js"
compatibility_date = "2026-07-01"

# 15분마다 정시 실행 (Cloudflare Cron — GitHub Actions보다 안정적)
[triggers]
crons = ["*/15 * * * *"]

[vars]
GH_REPO = "molahboda/money-atlas"
GH_PATH = "js/live.js"
GH_BRANCH = "main"

# GitHub 토큰은 파일에 쓰지 말고 아래 명령으로 등록:
#   npx wrangler secret put GH_TOKEN --config wrangler-updater.toml
