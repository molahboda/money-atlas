name: 실시간 데이터 갱신

# 갱신은 Cloudflare Workers(workers/updater.js)가 15분마다 정시 실행합니다.
# 이 워크플로는 백업용 수동 실행 전용으로 남겨둡니다.
# (Cloudflare가 죽었을 때 gh workflow run update-live.yml 로 수동 갱신)
on:
  workflow_dispatch:          # 수동 실행 버튼 (백업)
  # schedule:                 # ← Cloudflare로 이관하며 비활성화
  #   - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: live-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 시세·뉴스 수집
        run: python3 update_live.py

      - name: 변경 시 커밋·푸시
        run: |
          git config user.name "money-atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add js/live.js
          git diff --cached --quiet || (git commit -m "chore: 실시간 데이터 갱신" \
            && git pull --rebase -X theirs origin main && git push)
