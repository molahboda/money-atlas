name: 실시간 데이터 갱신

# GitHub Pages(정적 호스팅)에서도 시세·뉴스가 자동 갱신되도록
# 매시간 update_live.py 를 실행해 js/live.js 를 커밋합니다.
on:
  schedule:
    - cron: '7 * * * *'   # 매시 7분 (UTC)
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: live-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 시세·뉴스 수집
        run: python3 update_live.py

      - name: 변경 시 커밋·푸시
        run: |
          git config user.name "money-atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add js/live.js
          git diff --cached --quiet || (git commit -m "chore: 실시간 데이터 갱신" \
            && git pull --rebase -X theirs origin main && git push)
